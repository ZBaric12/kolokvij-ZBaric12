
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: kolokvij/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build application
        run: mvn -B package -DskipTests

      - name: Login to OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Tag image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image
        run: |
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}

      - name: Replace image placeholder
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/kolokvij-deploy.yaml

      - name: Deploy to OKE
        run: |
          kubectl apply -f k8s/kolokvij-deploy.yaml
          kubectl rollout status deployment/kolokvij

      - name: Smoke test
        run: |
          sleep 60
          EXTERNAL_IP=$(kubectl get svc kolokvij-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl http://$EXTERNAL_IP:8080/hello/Kolokvij
