
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: kolokvij/app

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build application
        run: mvn -B package -DskipTests

      - name: Login to OCIR
        uses: oracle-actions/login-ocir@v1.0.1
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}
          region: eu-frankfurt-1

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Tag image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image
        run: |
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI
        uses: oracle-actions/install-oci-cli@v1.3.2
        with:
          region: ${{ secrets.OCI_CLI_REGION }}
          user: ${{ secrets.OCI_CLI_USER }}
          fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Setup kubeconfig
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        with:
          cluster: ${{ secrets.OKE_CLUSTER_OCID }}

      - name: Replace image placeholder
        run: |
          sed -i 's|IMAGE_PLACEHOLDER|fra.ocir.io/${{ secrets.OCIR_NAMESPACE }}/kolokvij/app:${{ github.sha }}|g' k8s/kolokvij-deploy.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/kolokvij-deploy.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/kolokvij

      - name: Smoke test
        run: |
          sleep 60
          EXTERNAL_IP=$(kubectl get svc kolokvij-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl http://$EXTERNAL_IP:8080/hello/Kolokvij
