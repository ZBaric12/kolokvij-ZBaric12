
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kolokvij
  labels:
    app: kolokvij
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kolokvij
  template:
    metadata:
      labels:
        app: kolokvij
    spec:
      containers:
      - name: kolokvij
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kolokvij-lb
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "100"
spec:
  type: LoadBalancer
  selector:
    app: kolokvij
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
